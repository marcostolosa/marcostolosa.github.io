title: Mind Security - Blog
description: "A Blog for Hackers"
author:
  name: "Marcos Tolosa"
  email: "marcostolosa@protonmail.com"
  url: "https://mindsecurity.org/blog/"

baseurl: /

source: .
destination: ./_site
permalink: /:title
paginate: 3
