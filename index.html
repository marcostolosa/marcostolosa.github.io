            content: "";
            position: fixed;

            z-index: -2;

        /* Subtle grid overlay */
        body::after {
            content: "";
            position: fixed;

        .operator-panel {

                                    <div className="section-header"><h2 className="text-xl font-bold text-white font-mono">VOLUNTEER WORK</h2></div>
                                    {DATA.volunteer.map((v, idx) => (
                                        <div key={idx} className="operator-panel p-5">
                                            <div className="flex justify-between mb-1">
                                                <h3 className="font-bold text-white">{v.org}</h3>
                                                <span className="text-[10px] text-muted bg-white/5 px-2 py-0.5 rounded">{v.period}</span>
                                            </div>
                                            <p className="text-primaryLight font-mono text-xs mb-2">{v.role}</p>
                                            <p className="text-sm text-gray-400">{v.desc}</p>
                                        </div>
                                    ))}
                                </div>
                            </div>
                        </div>
                    )}

                    {/* OPERATIONS TAB */}
                    {tab === 'ops' && (
                        <div className="max-w-4xl mx-auto animate-fade-in">
                            <div className="section-header"><h2 className="text-xl font-bold text-white font-mono">ACTIVE ENGAGEMENTS</h2></div>
                            <div className="space-y-6 border-l border-border ml-3 pl-8 relative">
                                {DATA.experience.map((exp, idx) => (
                                    <div key={idx} className="relative group">
                                        <div className="absolute -left-[39px] top-6 w-4 h-4 bg-primary rounded-full border-2 border-bg group-hover:scale-125 transition-transform shadow-[0_0_10px_#dc2626]"></div>
                                        <div className="operator-panel p-6">
                                            <div className="flex flex-col sm:flex-row justify-between sm:items-center mb-2">
                                                <h3 className="text-xl font-bold text-white">{exp.company}</h3>
                                                <span className="text-xs text-muted font-mono bg-white/5 px-2 py-1 rounded mt-2 sm:mt-0 w-fit">{exp.period}</span>
                                            </div>
                                            <p className="text-primaryLight font-mono text-sm mb-4">{exp.role}</p>
                                            <p className="text-gray-400 text-sm">{exp.desc}</p>
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* ARSENAL TAB */}
                    {tab === 'arsenal' && (
                        <div className="animate-fade-in">
                            <div className="section-header"><h2 className="text-xl font-bold text-white font-mono">TOOL DEVELOPMENT</h2></div>
                            <div className="grid md:grid-cols-2 lg:grid-cols-3 gap-6">
                                {DATA.projects.map((proj, idx) => (
                                    <div key={idx} className="operator-panel p-6 flex flex-col group hover:-translate-y-1">
                                        <div className="flex justify-between items-start mb-4">
                                            <div className="flex items-center gap-2">
                                                <h3 className="text-lg font-bold text-white font-mono group-hover:text-primaryLight transition-colors">{proj.title}</h3>
                                                {proj.featured && <span className="text-[9px] font-mono uppercase tracking-wider text-accent border border-accent/40 bg-accent/10 px-1.5 py-0.5 rounded">live</span>}
                                            </div>
                                            <a href={proj.url} target="_blank" className="text-muted hover:text-white transition-colors" aria-label="GitHub repo"><i className="fa-brands fa-github"></i></a>
                                        </div>
                                        <p className="text-sm text-gray-400 mb-6 flex-1">{proj.desc}</p>
                                        <div className="flex flex-wrap gap-2 pt-4 border-t border-border mt-auto items-center">
                                            {proj.tech.map(t => <span key={t} className="text-[10px] font-mono text-muted bg-bg px-2 py-1 border border-border rounded">{t}</span>)}
                                            {proj.landing && (
                                                <a href={proj.landing} className="ml-auto inline-flex items-center gap-1.5 text-[11px] font-mono text-primaryLight hover:text-white transition-colors">
                                                    Landing <i className="fa-solid fa-arrow-right text-[9px]"></i>
                                                </a>
                                            )}
                                        </div>
                                    </div>
                                ))}
                            </div>
                        </div>
                    )}

                    {/* CREDENTIALS TAB */}
                    {tab === 'certs' && (
                        <div className="max-w-5xl mx-auto animate-fade-in">
                            <div className="grid md:grid-cols-2 gap-8">
                                <div>
                                    <div className="section-header"><h2 className="text-xl font-bold text-white font-mono">CERTIFICATIONS</h2></div>
                                    <div className="space-y-3">
                                        {DATA.certs.map((c, i) => (
                                            <div key={i} className="operator-panel p-3.5 border-l-2 border-transparent hover:border-primary flex items-center justify-between group">
                                                <span className="text-sm text-gray-300 group-hover:text-white transition-colors">{c}</span>
                                                <i className="fa-solid fa-check text-green-500 text-xs"></i>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                                <div>
                                    <div className="section-header"><h2 className="text-xl font-bold text-white font-mono">ACADEMIC BACKGROUND</h2></div>
                                    <div className="space-y-4">
                                        {DATA.education.map((edu, i) => (
                                            <div key={i} className="operator-panel p-4">
                                                <h4 className="font-bold text-white text-sm">{edu.school}</h4>
                                                <p className="text-xs text-primaryLight font-mono mt-1">{edu.course}</p>
                                                <div className="text-[10px] text-muted mt-2 text-right">{edu.year}</div>
                                            </div>
                                        ))}
                                    </div>
                                </div>
                            </div>
                        </div>
                    )}

                    {/* FOOTER */}
                    <footer className="mt-16 pt-8 border-t border-border flex flex-col sm:flex-row items-center justify-between gap-4 text-muted">
                        <span className="font-mono text-xs">© 2026 Marcos Tolosa · <span className="text-primary">Tr0p</span></span>
                        <div className="flex gap-5">
                            <a href={DATA.profile.github} target="_blank" className="hover:text-white transition-colors"><i className="fa-brands fa-github"></i></a>
                            <a href={DATA.profile.linkedin} target="_blank" className="hover:text-primaryLight transition-colors"><i className="fa-brands fa-linkedin"></i></a>
                            <a href={DATA.profile.youtube} target="_blank" className="hover:text-primaryLight transition-colors"><i className="fa-brands fa-youtube"></i></a>
                        </div>
                    </footer>

                </div>
            );
        };

        const root = ReactDOM.createRoot(document.getElementById('root'));
        root.render(<App />);
    </script>
</body>
</html>
